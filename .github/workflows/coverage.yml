name: Coverage

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel in-progress runs for PRs only; never interrupt a master baseline upload.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  coverage:
    name: Generate and upload coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history lets Codecov compute accurate coverage diffs on PRs.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests with coverage
        run: ./gradlew testDebugUnitTest jacocoTestReport --stacktrace

      - name: Validate JaCoCo report
        run: |
          REPORT=build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          if [ ! -f "$REPORT" ]; then
            echo "ERROR: JaCoCo report not found at $REPORT"
            echo "Check that exec files are being generated (Gradle JaCoCo plugin must be applied to submodules)."
            exit 1
          fi
          echo "JaCoCo report found: $REPORT"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: build/reports/jacoco/jacocoTestReport/html/
          retention-days: 14
