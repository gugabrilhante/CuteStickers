codecov:
  branch: master
  notify:
    require_ci_to_pass: yes

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        target: 60%
        threshold: 5%
        informational: false

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false

github_checks:
  annotations: true

ignore:
  - "**/R.class"
  - "**/R$*.class"
  - "**/BuildConfig.*"
  - "**/Manifest*.*"
  - "**/*Test*.*"
  - "android/**/*.*"
  - "**/*_HiltModules*"
  - "**/*_Factory*"
  - "**/*_MembersInjector*"
  - "**/DaggerHilt*"
  - "**/*_Impl*"
  - "**/ComposableSingletons*"
  - "**/*Navigation*"
  - "**/*Route*"
